<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" role="img">
<title>compileX — Online Code Editor &amp; IDE</title>
<desc>Banner for compileX, a multi-language online code editor with AI-powered GitHub insights</desc>
<defs>
<style>
.f{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
.c{font-family:'Courier New',Courier,monospace;font-size:12px}
.kw{fill:#569CD6}.ty{fill:#4EC9B0}.fn{fill:#DCDCAA}.va{fill:#9CDCFE}
.cm{fill:#6A9955}.pu{fill:#D4D4D4}
</style>
<linearGradient id="bg" x1="0" y1="0" x2="900" y2="280" gradientUnits="userSpaceOnUse">
  <stop offset="0%" stop-color="#0d1117"/>
  <stop offset="60%" stop-color="#090e1a"/>
  <stop offset="100%" stop-color="#0d1117"/>
</linearGradient>
<linearGradient id="tg" x1="55" y1="0" x2="310" y2="0" gradientUnits="userSpaceOnUse">
  <stop offset="0%" stop-color="#ffffff"/>
  <stop offset="100%" stop-color="#60a5fa"/>
</linearGradient>
<linearGradient id="al" x1="55" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
  <stop offset="0%" stop-color="#60a5fa"/>
  <stop offset="100%" stop-color="#a78bfa"/>
</linearGradient>
<pattern id="dp" x="0" y="0" width="35" height="35" patternUnits="userSpaceOnUse">
  <circle cx="17.5" cy="17.5" r="0.8" fill="#ffffff" opacity="0.09"/>
</pattern>
<clipPath id="lp"><rect x="0" y="0" width="528" height="280"/></clipPath>
<clipPath id="fc"><rect width="900" height="280" rx="12"/></clipPath>
<clipPath id="win"><rect x="548" y="15" width="328" height="250" rx="8"/></clipPath>
<clipPath id="ca"><rect x="548" y="61" width="328" height="196"/></clipPath>
</defs>

<rect width="900" height="280" rx="12" fill="url(#bg)"/>
<rect width="900" height="280" rx="12" fill="url(#dp)" clip-path="url(#fc)"/>

<circle cx="80" cy="140" r="165" fill="#60a5fa" opacity="0.022" clip-path="url(#fc)"/>
<circle cx="80" cy="140" r="90" fill="#60a5fa" opacity="0.032" clip-path="url(#fc)">
  <animate attributeName="opacity" values="0.022;0.058;0.022" dur="3s" repeatCount="indefinite"/>
</circle>
<circle cx="820" cy="140" r="165" fill="#a78bfa" opacity="0.02" clip-path="url(#fc)"/>
<circle cx="820" cy="140" r="90" fill="#a78bfa" opacity="0.028" clip-path="url(#fc)">
  <animate attributeName="opacity" values="0.018;0.052;0.018" dur="4s" repeatCount="indefinite"/>
</circle>

<g clip-path="url(#lp)">
  <circle cx="90" cy="235" r="2" fill="#60a5fa" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0.6;0" dur="3s" begin="0s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0 0;-8 -80" dur="3s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="162" cy="250" r="1.5" fill="#a78bfa" opacity="0">
    <animate attributeName="opacity" values="0;0.65;0" dur="3.5s" begin="0.7s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0 0;5 -82" dur="3.5s" begin="0.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="248" cy="242" r="2.5" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="4s" begin="1.4s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0 0;10 -88" dur="4s" begin="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="335" cy="253" r="1.5" fill="#60a5fa" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="3.2s" begin="0.3s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0 0;-5 -72" dur="3.2s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="422" cy="245" r="2" fill="#a78bfa" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="3.8s" begin="1.8s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0 0;8 -79" dur="3.8s" begin="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="252" r="1.5" fill="#60a5fa" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="2.9s" begin="0.9s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0 0;-3 -67" dur="2.9s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="132" cy="260" r="2" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="4.2s" begin="2.1s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0 0;7 -90" dur="4.2s" begin="2.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="258" r="1.5" fill="#60a5fa" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="3.6s" begin="1.1s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0 0;-10 -74" dur="3.6s" begin="1.1s" repeatCount="indefinite"/>
  </circle>
</g>

<line x1="530" y1="22" x2="530" y2="258" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4 7"/>

<!-- ===== LEFT CONTENT ===== -->

<text x="55" y="91" class="f" font-size="52" font-weight="700" fill="url(#tg)" letter-spacing="-1">compileX</text>
<rect x="55" y="103" width="0" height="2.5" rx="1.25" fill="url(#al)">
  <animate attributeName="width" from="0" to="245" dur="1.2s" begin="0.3s" fill="freeze"/>
</rect>

<text x="55" y="137" class="f" font-size="17" font-weight="600" fill="#e6edf3" letter-spacing="0.2">Online Code Editor &amp; IDE</text>
<text x="55" y="160" class="f" font-size="13" fill="#8b949e" font-style="italic" letter-spacing="0.5">10 Languages  ·  5 Themes  ·  AI-Powered</text>

<text x="55"  y="192" class="f" font-size="12.5" fill="#60a5fa">Getting Started</text>
<text x="170" y="192" class="f" font-size="12.5" fill="#4a5568"> · </text>
<text x="184" y="192" class="f" font-size="12.5" fill="#60a5fa">Features</text>
<text x="237" y="192" class="f" font-size="12.5" fill="#4a5568"> · </text>
<text x="251" y="192" class="f" font-size="12.5" fill="#60a5fa">Themes</text>
<text x="298" y="192" class="f" font-size="12.5" fill="#4a5568"> · </text>
<text x="312" y="192" class="f" font-size="12.5" fill="#60a5fa">Contributing</text>

<rect x="55"  y="210" width="84"  height="25" rx="4" fill="#0e0e0e" stroke="#333"    stroke-width="0.8"/>
<text x="97"  y="227" class="f" font-size="11" font-weight="600" fill="#ffffff"   text-anchor="middle">▲ Next.js 15</text>
<rect x="147" y="210" width="66"  height="25" rx="4" fill="#150f00" stroke="#7c3400" stroke-width="0.8"/>
<text x="180" y="227" class="f" font-size="11" font-weight="600" fill="#ff6c2f"   text-anchor="middle">Convex</text>
<rect x="221" y="210" width="56"  height="25" rx="4" fill="#1a0832" stroke="#6c47ff" stroke-width="0.8"/>
<text x="249" y="227" class="f" font-size="11" font-weight="600" fill="#9b7dff"   text-anchor="middle">Clerk</text>
<rect x="285" y="210" width="88"  height="25" rx="4" fill="#0c1830" stroke="#1e4a8c" stroke-width="0.8"/>
<text x="329" y="227" class="f" font-size="11" font-weight="600" fill="#3178c6"   text-anchor="middle">TypeScript</text>
<rect x="381" y="210" width="50"  height="25" rx="4" fill="#0c1a2e" stroke="#1d4ed8" stroke-width="0.8"/>
<text x="406" y="227" class="f" font-size="11" font-weight="600" fill="#60a5fa"   text-anchor="middle">MIT</text>

<!-- ===== RIGHT: CODE EDITOR ===== -->

<!-- Outer glow rings (animated) -->
<rect x="544" y="11" width="336" height="258" rx="10" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.07">
  <animate attributeName="opacity" values="0.05;0.16;0.05" dur="3.5s" repeatCount="indefinite"/>
</rect>
<rect x="546" y="13" width="332" height="254" rx="9"  fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.14"/>

<!-- Editor window -->
<rect x="548" y="15" width="328" height="250" rx="8" fill="#1e1e2e" stroke="#3d3d5c" stroke-width="0.5"/>

<!-- Title bar -->
<rect x="548" y="15" width="328" height="26" fill="#2d2d3d" clip-path="url(#win)"/>
<circle cx="568" cy="28" r="5.5" fill="#FF5F57"/>
<circle cx="583" cy="28" r="5.5" fill="#FEBC2E"/>
<circle cx="598" cy="28" r="5.5" fill="#28C840"/>
<text x="712" y="32" class="f" font-size="11" fill="#767693" text-anchor="middle">compileX — main.ts</text>

<!-- Tab bar -->
<rect x="548" y="41" width="328" height="20" fill="#252537" clip-path="url(#win)"/>
<rect x="554" y="41" width="66"  height="20" fill="#1e1e2e" clip-path="url(#win)"/>
<line x1="554" y1="61" x2="620" y2="61" stroke="#007ACC" stroke-width="2"/>
<text x="587" y="55" class="f" font-size="11" fill="#d4d4d4" text-anchor="middle">main.ts</text>
<text x="653" y="55" class="f" font-size="11" fill="#6b7280" text-anchor="middle">utils.py</text>
<text x="679" y="56" class="f" font-size="9"  fill="#6b7280">×</text>

<!-- Gutter separator -->
<line x1="584" y1="61" x2="584" y2="257" stroke="#3d3d5c" stroke-width="0.5"/>

<!-- Active line 4 — gutter accent + code area highlight -->
<rect x="548" y="120" width="3"   height="18" fill="#007ACC" opacity="0.85" clip-path="url(#win)"/>
<rect x="584" y="120" width="292" height="18" fill="#007ACC" opacity="0.05" clip-path="url(#win)">
  <animate attributeName="opacity" values="0.04;0.11;0.04" dur="2s" repeatCount="indefinite"/>
</rect>

<!-- Scan line (sweeps top to bottom of code area) -->
<rect x="584" y="62" width="292" height="1.5" opacity="0" fill="#60a5fa" clip-path="url(#ca)">
  <animate attributeName="y" values="62;256;256" keyTimes="0;0.88;1" dur="6s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0;0.45;0.4;0" keyTimes="0;0.02;0.86;0.88" dur="6s" repeatCount="indefinite"/>
</rect>

<!-- Line numbers -->
<text x="580" y="77"  class="c" fill="#4a5568" text-anchor="end">1</text>
<text x="580" y="95"  class="c" fill="#4a5568" text-anchor="end">2</text>
<text x="580" y="113" class="c" fill="#4a5568" text-anchor="end">3</text>
<text x="580" y="131" class="c" fill="#007ACC" text-anchor="end">4</text>
<text x="580" y="149" class="c" fill="#4a5568" text-anchor="end">5</text>
<text x="580" y="167" class="c" fill="#4a5568" text-anchor="end">6</text>
<text x="580" y="185" class="c" fill="#4a5568" text-anchor="end">7</text>
<text x="580" y="203" class="c" fill="#4a5568" text-anchor="end">8</text>
<text x="580" y="221" class="c" fill="#4a5568" text-anchor="end">9</text>
<text x="580" y="239" class="c" fill="#4a5568" text-anchor="end">10</text>

<!-- ── CODE ── -->
<!-- L1 · comment -->
<text x="592" y="77" class="c cm">// AI-powered insights</text>

<!-- L2 · async function analyze(repo) { -->
<text x="592" y="95" class="c kw">async </text>
<text x="634" y="95" class="c kw">function </text>
<text x="697" y="95" class="c fn">analyze</text>
<text x="746" y="95" class="c pu">(repo) {</text>

<!-- L3 ·   const data = await -->
<text x="606" y="113" class="c kw">const </text>
<text x="648" y="113" class="c va">data</text>
<text x="676" y="113" class="c pu"> = </text>
<text x="697" y="113" class="c kw">await</text>

<!-- L4 ·     AI.fetch(repo);  ← ACTIVE LINE + CURSOR -->
<text x="620" y="131" class="c ty">AI</text>
<text x="634" y="131" class="c pu">.</text>
<text x="641" y="131" class="c fn">fetch</text>
<text x="676" y="131" class="c pu">(repo);</text>

<!-- L5 · blank -->

<!-- L6 ·   return { -->
<text x="606" y="167" class="c kw">return </text>
<text x="655" y="167" class="c pu">{</text>

<!-- L7 ·     score: data.quality, -->
<text x="620" y="185" class="c va">score</text>
<text x="655" y="185" class="c pu">: </text>
<text x="669" y="185" class="c va">data</text>
<text x="697" y="185" class="c pu">.</text>
<text x="704" y="185" class="c va">quality</text>
<text x="753" y="185" class="c pu">,</text>

<!-- L8 ·     lang:  data.topLang, -->
<text x="620" y="203" class="c va">lang</text>
<text x="648" y="203" class="c pu">:  </text>
<text x="669" y="203" class="c va">data</text>
<text x="697" y="203" class="c pu">.</text>
<text x="704" y="203" class="c va">topLang</text>
<text x="753" y="203" class="c pu">,</text>

<!-- L9 ·   }; -->
<text x="606" y="221" class="c pu">};</text>

<!-- L10 · } -->
<text x="592" y="239" class="c pu">}</text>

<!-- Blinking cursor after "(repo);" on L4 -->
<rect x="725" y="120" width="7" height="14" fill="#AEAFAD">
  <animate attributeName="opacity" values="1;1;0;0" dur="1.2s" repeatCount="indefinite"/>
</rect>

<!-- Status bar -->
<rect x="548" y="256" width="328" height="9" fill="#007ACC" opacity="0.9" clip-path="url(#win)"/>
<text x="554" y="263" class="f" font-size="8" fill="#ffffff">TypeScript</text>
<text x="872" y="263" class="f" font-size="8" fill="#ffffff" text-anchor="end">Ln 4, Col 20</text>

<!-- Banner border -->
<rect width="900" height="280" rx="12" fill="none" stroke="#21262d" stroke-width="1"/>
</svg>